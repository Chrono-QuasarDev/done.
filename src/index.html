<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

  <title>Done.</title>
</head>
<body>
  <div class="container">
    <aside>
      <div class="logo">
        <h1>DONE<span class="dot">.</span></h1>
        <div>PROJECT MANAGER</div>
      </div>
      <div class="projects">
        <div class="project-title">PROJECTS</div>
        <ul class="project-lists">
        </ul>
      </div>
      <div class="project-btn">
        <a href="#">+ New Project</a>
      </div>
    </aside>

    <div class="main">
      <div class="main-header">
        <div class="header-container">
          <div class="personal">PERSONAL</div>
          <div class="data">
            <div>
              <span class="num">2</span> todos
            </div>
            <div>
              <span class="num">0</span> completed
            </div>
            <div>
              <span class="num">2</span> remaining
            </div>
          </div>
        </div>
        <div class="btn-container">
          <a href="#" class="todo-btn">+ Add Todo</a>
        </div>
      </div>

      <ul class="filters">
        <li><a href="#" class="tags">All</a></li>
        <li><a href="#" class="tags">Active</a></li>
        <li><a href="#" class="tags">completed</a></li>
        <li>
          <a href="#" class="tags">
            <span>🔴</span>
            High
          </a>
        </li>
        <li>
          <a href="#" class="tags">
            <span>🟡</span>
            Medium
          </a>
        </li>
        <li>
          <a href="#" class="tags">
            <span>🔵</span>
            Low
          </a>
        </li>
      </ul>

      <div class="content-area"></div>
    </div>
  </div>
</body>
</html>
