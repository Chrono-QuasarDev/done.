<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

        <ul></ul>
      </div>

    <div class="main">
      <div class="main_header">
        <div>
          <div>PERSONAL</div>
          <div>

              <span>2</span> todos
            </div>
            <div>

            </div>
          </div>
        </div>
        <div>
          <a href="#">+ Add Todo</a>
        </div>
      </div>

      <div class="filters">
        <ul>
          <li>All</li>
          <li>Active</li>
          <li>Completed</li>
          <li>High</li>
          <li>Medium</li>
          <li>Low</li>
